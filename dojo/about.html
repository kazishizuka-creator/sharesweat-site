<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DONUT Dojo — Dojoについて</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dojo.css">
</head>
<body class="cloak">
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>

<header class="dojo gated">
  <a href="home.html" class="dojo-brand"><span class="dojo-mark">道</span> DONUT&nbsp;Dojo</a>
  <nav class="dojo-nav">
    <a href="home.html"><span data-lang-ja>ホーム</span><span data-lang-en>Home</span></a>
    <a href="about.html" class="active"><span data-lang-ja>Dojoについて</span><span data-lang-en>About</span></a>
    <a href="admin.html" id="nav-admin" style="display:none"><span data-lang-ja>管理</span><span data-lang-en>Admin</span></a>
  </nav>
  <div class="dojo-actions">
    <span class="dojo-me" id="me"></span>
    <button class="lang">EN / 日本語</button>
    <button class="btn btn-ghost btn-sm" data-logout><span data-lang-ja>ログアウト</span><span data-lang-en>Log out</span></button>
  </div>
</header>

<div id="boot" class="loading">AUTHENTICATING…</div>

<main class="wrap gated" id="main" style="display:none">

  <!-- ============ ∞ シンボル（主役）============ -->
  <!-- 中央のリング（Sensei＝DONUTデバイス）を中心に、師範と範士が左右で支え高める構図 -->
  <div class="about-symbol">
    <svg viewBox="0 0 460 240" preserveAspectRatio="xMidYMid meet" role="img"
         aria-label="師範と範士が中央のSensei（DONUTデバイス）を支える無限大のシンボル">
      <defs>
        <linearGradient id="infGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#A99CFF"></stop>
          <stop offset="0.5" stop-color="#8B7BF0"></stop>
          <stop offset="1" stop-color="#5BD8FF"></stop>
        </linearGradient>
        <filter id="ringGlow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"></feGaussianBlur>
          <feMerge>
            <feMergeNode in="blur"></feMergeNode>
            <feMergeNode in="SourceGraphic"></feMergeNode>
          </feMerge>
        </filter>
      </defs>

      <!-- 太い帯の無限大（∞）。紫→シアンのグラデーション -->
      <path d="M 230,120 C 192,40 92,40 92,120 C 92,200 192,200 230,120 C 268,40 368,40 368,120 C 368,200 268,200 230,120 Z"
            fill="none" stroke="url(#infGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"></path>
      <!-- 帯の中央に走る淡いハイライト（厚みの艶） -->
      <path d="M 230,120 C 192,40 92,40 92,120 C 92,200 192,200 230,120 C 268,40 368,40 368,120 C 368,200 268,200 230,120 Z"
            fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="13" stroke-linejoin="round"></path>

      <!-- 左ループ：師範 / Shihan -->
      <text x="160" y="116" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-weight="700" font-size="27" fill="#EDEDF5">師範</text>
      <text x="160" y="137" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" letter-spacing="2.4" fill="#A99CFF">SHIHAN</text>

      <!-- 右ループ：範士 / Hanshi -->
      <text x="300" y="116" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-weight="700" font-size="27" fill="#EDEDF5">範士</text>
      <text x="300" y="137" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" letter-spacing="2.4" fill="#5BD8FF">HANSHI</text>

      <!-- 中央：ドーナツ状リング（Sensei＝DONUTデバイス）。交差点をマスクして主役に -->
      <circle cx="230" cy="120" r="40" fill="#05050a"></circle>
      <circle class="ring-halo" cx="230" cy="120" r="30" fill="none" stroke="#5BD8FF" stroke-width="8" filter="url(#ringGlow)"></circle>
      <circle cx="230" cy="120" r="30" fill="none" stroke="#5BD8FF" stroke-width="7"></circle>
      <text x="230" y="124" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="13" letter-spacing="1" fill="#5BD8FF">Sensei</text>
    </svg>
  </div>

  <!-- ============ 説明文エリア（後で記入。今はプレースホルダ）============ -->
  <div class="about-desc">
    <h2 class="about-h"><span data-lang-ja>Dojoについて</span><span data-lang-en>About the Dojo</span></h2>
    <p class="about-body"><span data-lang-ja>準備中</span><span data-lang-en>Coming soon</span></p>
  </div>

</main>

<script type="module">
import { requireAuth, isAdmin } from "./assets/firebase-init.js";
import { initLang, initLogout, escapeHtml, roleChips } from "./assets/dojo.js";

const $ = (id) => document.getElementById(id);

requireAuth((user, profile) => {
  const name  = (profile && profile.displayName) || "";
  const roles = (profile && profile.roles) || [];
  $("me").innerHTML = `<strong>${escapeHtml(name)}</strong> <span class="me-roles">${roleChips(roles)}</span>`;
  if(isAdmin(roles)) $("nav-admin").style.display = "";

  document.body.classList.remove("cloak");
  $("boot").style.display = "none";
  $("main").style.display = "block";
});

initLang();
initLogout();
</script>
</body>
</html>
