<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DONUT Dojo — ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dojo.css">
</head>
<body class="cloak">
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>

<header class="dojo gated">
  <a href="home.html" class="dojo-brand"><span class="dojo-mark">道</span> DONUT&nbsp;Dojo</a>
  <nav class="dojo-nav">
    <a href="home.html" class="active"><span data-lang-ja>ホーム</span><span data-lang-en>Home</span></a>
    <a href="admin.html" id="nav-admin" style="display:none"><span data-lang-ja>管理</span><span data-lang-en>Admin</span></a>
  </nav>
  <div class="dojo-actions">
    <span class="dojo-me" id="me"></span>
    <button class="lang">EN / 日本語</button>
    <button class="btn btn-ghost btn-sm" data-logout><span data-lang-ja>ログアウト</span><span data-lang-en>Log out</span></button>
  </div>
</header>

<div id="boot" class="loading">AUTHENTICATING…</div>

<main class="wrap gated" id="main" style="display:none">

  <!-- ============ (A) ファンドレイジング・ヒーロー ============ -->
  <section class="fund-hero" id="fund-hero">
    <span class="eyebrow"><span class="dot"></span><span data-lang-ja>ファンドレイジング</span><span data-lang-en>Fundraising</span></span>
    <div class="fund-amount-label"><span data-lang-ja>現在の調達額</span><span data-lang-en>Amount raised</span></div>
    <div class="fund-amount-wrap"><div class="fund-amount" id="fund-amount">¥0</div></div>
    <div class="fund-launch">
      <span class="fl-label"><span data-lang-ja>クラウドファンディング開始予定日</span><span data-lang-en>Crowdfunding launch</span></span>
      <span class="fl-date" id="fund-date">—</span>
    </div>
  </section>
  <div class="fund-divider"></div>

  <!-- ロール未付与のときの案内 -->
  <div id="no-role" class="empty" style="display:none">
    <span data-lang-ja>まだロールが付与されていません。運営（管理者）にご連絡ください。</span>
    <span data-lang-en>No role has been assigned to your account yet. Please contact the team.</span>
  </div>

  <!-- ============ (B) みなさまへのお知らせ ============ -->
  <div id="ann-section" style="display:none">
    <div class="section-title"><span data-lang-ja>みなさまへのお知らせ</span><span data-lang-en>Announcements</span></div>
    <div id="ann-list"></div>
  </div>

  <!-- ============ (C) トピックカード ============ -->
  <div id="cat-section" style="display:none">
    <div class="section-title"><span data-lang-ja>トピック</span><span data-lang-en>Topics</span></div>
    <div class="grid grid-cards" id="cat-list"></div>
  </div>

</main>

<script type="module">
import {
  db, requireAuth, isAdmin,
  collection, doc, getDoc, getDocs, query, where
} from "./assets/firebase-init.js";
import { initLang, initLogout, escapeHtml, roleChips, renderMarkdown, fmtTime, byCreatedDesc, byOrder } from "./assets/dojo.js";

const $ = (id) => document.getElementById(id);
const isEN = () => document.body.classList.contains("lang-en");

requireAuth(async (user, profile) => {
  const name  = (profile && profile.displayName) || (isEN() ? "member" : "メンバー");
  const roles = (profile && profile.roles) || [];

  $("me").innerHTML = `<strong>${escapeHtml(name)}</strong> <span class="me-roles">${roleChips(roles)}</span>`;
  if(isAdmin(roles)) $("nav-admin").style.display = "";

  document.body.classList.remove("cloak");
  $("boot").style.display = "none";
  $("main").style.display = "block";

  // (A) 調達額・予定日は「ログイン済みメンバー全員」が見る（read=isSignedIn）。ロール有無に関係なく読み込む。
  await loadFundraising();

  // (B)(C) は roles に依存。ロール未付与なら案内だけ出してクエリは投げない。
  if(roles.length === 0){ $("no-role").style.display = "block"; return; }
  await Promise.all([loadAnnouncements(roles), loadCategories(roles)]);
});

/* ============ (A) fundraising ============ */
function yen(n){ return "¥" + Math.round(n).toLocaleString("ja-JP"); }

// "YYYY-MM-DD" を日英それぞれの表記に（言語切替に追従させるため両方を span で出す）
function launchHtml(s){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || ""));
  if(!m) return escapeHtml(s || "—");
  const y = m[1], mo = +m[2], d = +m[3];
  const mEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][mo - 1];
  return `<span data-lang-ja>${y}年${mo}月${d}日</span><span data-lang-en>${mEn} ${d}, ${y}</span>`;
}

function animateCountUp(el, target){
  const dur = 1500, start = performance.now();
  function frame(now){
    const t = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    el.textContent = yen(target * eased);
    if(t < 1) requestAnimationFrame(frame);
    else el.textContent = yen(target);
  }
  requestAnimationFrame(frame);
}

async function loadFundraising(){
  const amtEl = $("fund-amount"), dateEl = $("fund-date");
  try{
    const snap = await getDoc(doc(db, "settings", "fundraising"));
    const data = snap.exists() ? snap.data() : null;
    const amount = (data && typeof data.currentAmount === "number") ? data.currentAmount : null;
    const launch = (data && data.launchDate) ? data.launchDate : null;

    dateEl.innerHTML = launch ? launchHtml(launch) : "—";

    if(amount == null){ amtEl.textContent = "—"; return; }
    // カウントアップは「セッション初回のみ」。以降のページ往復では即表示。
    const done = sessionStorage.getItem("ss_dojo_fund_countup") === "1";
    if(done){
      amtEl.textContent = yen(amount);
    }else{
      animateCountUp(amtEl, amount);
      try{ sessionStorage.setItem("ss_dojo_fund_countup", "1"); }catch(e){}
    }
  }catch(e){
    console.error("fundraising:", e);
    amtEl.textContent = "—";
  }
}

/* ============ (B) announcements ============ */
async function loadAnnouncements(roles){
  // array-contains-any は空配列だとエラー。roles 空なら何も出さない。
  // （roles をルールの hasAny と整合させるため。roles は最大でも数個＝上限10要素以内の想定）
  if(!roles || roles.length === 0) return;
  try{
    const snap = await getDocs(query(collection(db, "posts"), where("visibleTo", "array-contains-any", roles)));
    const anns = [];
    snap.forEach(d => { const x = d.data(); if(x.isAnnouncement) anns.push({ id: d.id, ...x }); });
    if(anns.length === 0) return;
    anns.sort(byCreatedDesc);
    $("ann-list").innerHTML = anns.map(a => `
      <div class="ann">
        <div class="ann-meta">${escapeHtml(a.authorName || "")} · ${escapeHtml(fmtTime(a.createdAt))}</div>
        <h3>${escapeHtml(a.title || "")}</h3>
        <div class="body">${renderMarkdown(a.body || "")}</div>
      </div>`).join("");
    $("ann-section").style.display = "block";
  }catch(e){ console.error("announcements:", e); }
}

/* ============ (C) category cards ============ */
async function loadCategories(roles){
  if(!roles || roles.length === 0) return;   // array-contains-any は空配列だと不可
  try{
    const snap = await getDocs(query(collection(db, "categories"), where("visibleTo", "array-contains-any", roles)));
    const cats = [];
    snap.forEach(d => cats.push({ id: d.id, ...d.data() }));
    if(cats.length === 0) return;
    cats.sort(byOrder);
    $("cat-list").innerHTML = cats.map(c => `
      <a class="card" href="category.html?id=${encodeURIComponent(c.id)}">
        <span class="pk">Topic</span>
        <h3><span data-lang-ja>${escapeHtml(c.title || c.titleEn || "")}</span><span data-lang-en>${escapeHtml(c.titleEn || c.title || "")}</span></h3>
      </a>`).join("");
    $("cat-section").style.display = "block";
  }catch(e){ console.error("categories:", e); }
}

initLang();
initLogout();
</script>
</body>
</html>
